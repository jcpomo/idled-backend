services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    volumes: ["./:/code"]
    depends_on: [postgres, qdrant, redis, minio]

  worker:
    build: .
    command: arq app.documentos.worker.WorkerSettings
    env_file: .env
    volumes: ["./:/code"]
    depends_on: [postgres, qdrant, redis, minio]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: idled
      POSTGRES_PASSWORD: idled
      POSTGRES_DB: idled
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrantdata:/qdrant/storage"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  mini-laravel:
    build: ./mini-laravel
    ports: ["8080:8080"]
    env_file:
      - path: ./mini-laravel/.env
        required: false

volumes:
  pgdata:
  qdrantdata:
  miniodata:
